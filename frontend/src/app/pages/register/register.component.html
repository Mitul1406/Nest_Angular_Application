<div class="container mt-5">
  <h2>Register</h2>
  <form>
    <div class="form-group mb-3">
      <input [(ngModel)]="email" name="email" type="email" class="form-control" placeholder="Email" />
    </div>
    <div class="form-group mb-3">
      <input [(ngModel)]="password" name="password" type="password" class="form-control" placeholder="Password" />
    </div>
    <button (click)="register()" class="btn btn-primary">
      {{ loading ? 'Sending OTP...' : 'Register' }}
    </button>
  </form>
  <p class="mt-3">Already have an account? <a routerLink="/login">Login</a></p>
</div>
